# Ported from .forgejo/workflows/release.yml — GitHub Actions–specific runners and release publish.
name: Release

on:
  push:
    tags:
      - 'v1.*'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate_changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.release_body }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-binstall
        shell: bash
        run: |
          set -euo pipefail
          curl -L --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install git-cliff
        shell: bash
        run: cargo binstall git-cliff -y

      - name: Generate a changelog
        id: git-cliff
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git-cliff --config cliff.toml --output CHANGELOG.md --latest --no-exec \
            --github-repo "${{ github.repository }}" \
            --github-token "$GH_TOKEN"
          git config user.name "playXE"
          git config user.email "adel.prokurov@gmail.com"
          if [ -n "$(git diff CHANGELOG.md)" ]; then
            echo "Changes detected. Updating CHANGELOG.md"
            git add CHANGELOG.md
            git commit -m "chore: update CHANGELOG.md [skip ci]"
            git push origin HEAD:main
          else
            echo "No new changes to changelog."
          fi
          echo "release_body<<EOF" >> "$GITHUB_OUTPUT"
          cat CHANGELOG.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  build:
    name: Build release (${{ matrix.arch }})
    needs: [generate_changelog]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs_on: ubuntu-latest
          - arch: aarch64
            runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}
    env:
      MMTK_GC_TRIGGER: DynamicHeapSize:1G,6G
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Install system deps
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang lld rsync make fakeroot rpm

      - name: Build Capy
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          make VERSION="$VERSION" build

      - name: Create portable tarball
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          make VERSION="$VERSION" dist-portable

      - name: Create .deb package
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION_NO_V="${VERSION#v}"
          make VERSION="$VERSION_NO_V" dist-deb

      - name: Create .rpm package
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION_NO_V="${VERSION#v}"
          make VERSION="$VERSION_NO_V" dist-rpm

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: capyscheme-${{ github.ref_name }}-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm

  publish:
    name: Publish GitHub Release
    needs: [generate_changelog, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: capyscheme-${{ github.ref_name }}-*
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: false
          body: ${{ needs.generate_changelog.outputs.release_body }}
          files: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
