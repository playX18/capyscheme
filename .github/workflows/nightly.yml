# Ported from .forgejo/workflows/nightly.yml — GitHub runners, gh-release, same 24h / changelog rules.
name: Nightly

on:
  schedule:
    - cron: '15 3 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force build even if no meaningful commits in last 24h (same as when activity detected)'
        required: false
        default: 'false'

permissions:
  contents: write

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check_and_run:
    name: Relevant work (last 24h)
    runs-on: ubuntu-latest
    outputs:
      recent_commits: ${{ steps.check_commits.outputs.recent_commits }}
      date: ${{ steps.check_commits.outputs.date }}
      short_sha: ${{ steps.check_commits.outputs.short_sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check recent commits
        id: check_commits
        shell: bash
        env:
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          set -euo pipefail
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          if [ "$FORCE" = "true" ]; then
            echo "recent_commits=true" >> "$GITHUB_OUTPUT"
            echo "Force build requested."
            exit 0
          fi
          # Count commits in the last 24h, excluding [skip ci] + CHANGELOG.md-only (same as Forgejo)
          meaningful=0
          for commit in $(git log --since='24 hours ago' --pretty=format:%H); do
            [ -z "$commit" ] && continue
            msg=$(git log -1 --pretty=%B "$commit")
            filelist=$(git diff-tree --no-commit-id --name-only -r "$commit" | sort -u)
            if [ -z "$filelist" ]; then
              meaningful=$((meaningful + 1))
              continue
            fi
            if echo "$msg" | grep -qiE '\[skip[[:space:]]*ci\]|\[ci[[:space:]]*skip\]|\[no[[:space:]]*ci\]'; then
              only_changelog=1
              OLDIFS=$IFS
              IFS=$'\n'
              for f in $filelist; do
                [ -z "$f" ] && continue
                if [ "$f" != "CHANGELOG.md" ]; then
                  only_changelog=0
                  break
                fi
              done
              IFS=$OLDIFS
              if [ "$only_changelog" -eq 1 ]; then
                continue
              fi
            fi
            meaningful=$((meaningful + 1))
          done
          if [ "$meaningful" -gt 0 ]; then
            echo "recent_commits=true" >> "$GITHUB_OUTPUT"
            echo "Found meaningful recent commits: $meaningful"
          else
            echo "recent_commits=false" >> "$GITHUB_OUTPUT"
            echo "No recent commits (or only [skip ci] CHANGELOG). Skipping job."
          fi

  generate_changelog:
    name: Generate changelog
    needs: [check_and_run]
    if: needs.check_and_run.outputs.recent_commits == 'true'
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.release_body }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-binstall
        shell: bash
        run: |
          set -euo pipefail
          curl -L --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
      - name: Install git-cliff
        shell: bash
        run: cargo binstall git-cliff -y
      - name: Generate a changelog
        id: git-cliff
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git-cliff --config cliff.toml --output CHANGELOG.md --no-exec \
            --github-repo "${{ github.repository }}" \
            --github-token "$GH_TOKEN"
          git config user.name "playXE"
          git config user.email "adel.prokurov@gmail.com"
          if [ -n "$(git diff CHANGELOG.md)" ]; then
            echo "Changes detected. Updating CHANGELOG.md"
            git add CHANGELOG.md
            git commit -m "chore: update CHANGELOG.md [skip ci]"
            git push
          else
            echo "No new changes to changelog."
          fi
          echo "release_body<<EOF" >> "$GITHUB_OUTPUT"
          cat CHANGELOG.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  build:
    name: Build nightly (${{ matrix.arch }})
    needs: [check_and_run, generate_changelog]
    if: needs.check_and_run.outputs.recent_commits == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs_on: ubuntu-latest
          - arch: aarch64
            runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}
    env:
      MMTK_GC_TRIGGER: DynamicHeapSize:1G,8G
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      - name: Install system deps
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang lld rsync make
      - name: Build Capy
        shell: bash
        run: |
          set -euo pipefail
          make VERSION="nightly-$(date -u +%Y-%m-%d)" build
      - name: Create portable tarball
        shell: bash
        run: |
          set -euo pipefail
          make VERSION="nightly-$(date -u +%Y-%m-%d)" dist-portable
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: capyscheme-nightly-${{ needs.check_and_run.outputs.date }}-${{ needs.check_and_run.outputs.short_sha }}-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            dist/*.tar.gz

  publish_nightly:
    name: Publish GitHub Release "nightly" (x86_64 + aarch64)
    needs: [check_and_run, generate_changelog, build]
    if: needs.check_and_run.outputs.recent_commits == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all nightly tarballs
        uses: actions/download-artifact@v4
        with:
          pattern: capyscheme-nightly-${{ needs.check_and_run.outputs.date }}-${{ needs.check_and_run.outputs.short_sha }}-*
          path: dist
          merge-multiple: true
      - name: Publish/Update GitHub Release "nightly"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly
          prerelease: true
          generate_release_notes: false
          body: |
            Nightly build of CapyScheme
            - Date: ${{ needs.check_and_run.outputs.date }}
            - Commit: ${{ needs.check_and_run.outputs.short_sha }}

            Changelog:
            ${{ needs.generate_changelog.outputs.release_body }}
          files: |
            dist/*.tar.gz
