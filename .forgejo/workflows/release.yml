on: 
  push: 
    tags: 
      - 'v*'
  workflow_dispatch:
  workflow_call:

jobs: 
  generate_changelog: 
    name: Generate changelog
    runs-on: debian-trixie 
    outputs:
      release_body: ${{ steps.git-cliff.outputs.release_body }}
    steps: 
      - name: Checkout 
        uses: actions/checkout@v4
        with: 
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: https://codeberg.org/wackbyte/rust-toolchain@trunk
        with: 
          toolchain: nightly
      - name: Install cargo-binstall
        shell: bash
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
      - name: Install git-cliff 
        shell: bash 
        run: |
          cargo binstall git-cliff -y 
      - name: Generate a changelog
        shell: bash
        id: git-cliff
        run: |
          git-cliff --config cliff.toml --output CHANGELOG.md --latest --no-exec --gitea-repo ${{ github.repository }} --gitea-token ${{ secrets.CODEBERG_TOKEN }}
          git config user.name "playXE"
          git config user.email "adel.prokurov@gmail.com"
          if [ -n "$(git diff CHANGELOG.md)" ]; then 
            echo "Changes detected. Updating CHANGELOG.md"
            git add CHANGELOG.md
            git commit -m "chore: update CHANGELOG.md [skip ci]"
            git push origin HEAD:main
          else 
            echo "No new changes to changelog."
          fi
          
          echo "release_body<<EOF" >> $GITHUB_OUTPUT
          cat "CHANGELOG.md" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          

  release:
    needs: [generate_changelog]
    runs-on: debian-trixie
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare release metadata
        shell: bash
        run: |
          release_version="${RELEASE_TAG#v}"
          echo "RELEASE_VERSION=$release_version" >> "$GITHUB_ENV"
          echo "Release tag: $RELEASE_TAG"
          echo "Release version: $release_version"
      - name: Install Rust toolchain
        uses: https://codeberg.org/wackbyte/rust-toolchain@trunk
        with: 
          toolchain: nightly
      - name: Install system deps
        shell: bash
        run: |
          apt update -y
          apt install -y rsync make gcc rpm
      - name: Build Capy
        shell: bash
        run: |
          make -j4 VERSION="$RELEASE_VERSION" build
      - name: Create portable tarball
        shell: bash
        run: |
          make VERSION="$RELEASE_VERSION" dist-portable
      - name: Create deb package 
        shell: bash
        run: |
          make VERSION="$RELEASE_VERSION" dist-deb
      - name: Create rpm package 
        shell: bash
        run: |
          make VERSION="$RELEASE_VERSION" dist-rpm
      - name: Publish Deb to package registry 
        shell: bash 
        run: |
          deb_file="$(find dist -maxdepth 1 -type f -name "capyscheme_${RELEASE_VERSION}_*.deb" -print -quit)"
          test -n "$deb_file"
          curl --user playXE:${{ secrets.CODEBERG_TOKEN }} \
               --upload-file "$deb_file" \
               https://codeberg.org/api/packages/playxe/debian/pool/trixie/main/upload
      - name: Publish RPM to package registry 
        shell: bash 
        run: |
          rpm_file="$(find dist -maxdepth 1 -type f -name "capyscheme-${RELEASE_VERSION}-*.rpm" -print -quit)"
          test -n "$rpm_file"
          curl --user playXE:${{ secrets.CODEBERG_TOKEN }} \
               --upload-file "$rpm_file" \
               https://codeberg.org/api/packages/playxe/rpm/upload
      - name: Publish release
        uses: actions/forgejo-release@v2.7.3
        with: 
          direction: upload 
          url: https://codeberg.org
          repo: playxe/capy
          token: ${{ secrets.CODEBERG_TOKEN }}
          release-dir: dist
          override: true 
          tag: ${{ env.RELEASE_TAG }}
          title: Release ${{ env.RELEASE_TAG }}
          release-notes: |
            ${{ needs.generate_changelog.outputs.release_body }}
